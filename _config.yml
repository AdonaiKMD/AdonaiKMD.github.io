title: "From Zero to Hero"
description: "From Zero to Hero — reaching the frontier, then helping push the next one. Learning modern AI from first principles — the math, the models, and what comes after."
url: "https://AdonaiKMD.github.io"

theme: minima

# Math rendering — let MathJax handle everything client-side.
# Setting math_engine to null stops kramdown from rewriting $...$ into \(...\)
# (which was corrupting matrix \\ row breaks and \{ \} braces).
markdown: kramdown
kramdown:
  math_engine: null

# Navigation
header_pages:
  - about.md

minima:
  skin: dark
  social_links:
    - { platform: github, user_url: "https://github.com/AdonaiKMD" }

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
